# markdownlint — relaxed for operational/technical docs.
config:
  MD013: false   # line length
  MD033: false   # inline HTML (used in admonitions / mermaid)
  MD041: false   # first line need not be a top-level heading (front matter)
  MD024:
    siblings_only: true   # allow repeated headings in different sections
  MD029: false   # ordered-list numbering style
  MD046: false   # code block style (indented vs fenced)
globs:
  - "**/*.md"
ignores:
  - "CHANGELOG.md"
  - "node_modules"
