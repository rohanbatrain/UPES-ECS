<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" font-family="'Segoe UI',Arial,Helvetica,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0F0D"/>
      <stop offset="1" stop-color="#0C1A14"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.12" r="0.62">
      <stop offset="0" stop-color="#01A982" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#01A982" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>
  <rect x="0" y="0" width="1280" height="8" fill="#01A982"/>

  <!-- wordmark -->
  <g transform="translate(80,78)">
    <rect x="0" y="-22" width="30" height="30" rx="6" fill="#01A982"/>
    <circle cx="21" cy="-13" r="4.5" fill="none" stroke="#0A0F0D" stroke-width="2.4"/>
    <text x="46" y="2" font-size="26" font-weight="700" fill="#EAF2EF" letter-spacing="0.5">UPES-ECS</text>
  </g>

  <!-- 111 dial mark -->
  <g transform="translate(1012,214)">
    <circle cx="0" cy="0" r="146" fill="none" stroke="#01A982" stroke-opacity="0.16" stroke-width="2"/>
    <circle cx="0" cy="0" r="106" fill="none" stroke="#01A982" stroke-opacity="0.30" stroke-width="2"/>
    <text x="0" y="-62" font-size="16" fill="#8CA39B" letter-spacing="3" text-anchor="middle">DIAL</text>
    <text x="0" y="40" font-size="140" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="-6">111</text>
  </g>

  <!-- headline -->
  <text x="80" y="212" font-size="78" font-weight="800" fill="#FFFFFF" letter-spacing="-2">When networks fail,</text>
  <text x="80" y="298" font-size="78" font-weight="800" letter-spacing="-2"><tspan fill="#FFFFFF">we </tspan><tspan fill="#01A982">don't.</tspan></text>
  <text x="82" y="356" font-size="27" fill="#9DB1AA" font-weight="500">Campus Emergency Communication System — dial one number, anywhere.</text>

  <!-- divider -->
  <rect x="82" y="404" width="1116" height="1" fill="#1E2D28"/>

  <!-- footer chips -->
  <g transform="translate(82,452)" font-size="23" font-weight="600">
    <rect x="0" y="-18" width="9" height="24" rx="2" fill="#01A982"/>
    <text x="22" y="0" fill="#7FE8CD">Powered by HPE Juniper Networking</text>
    <text x="470" y="0" fill="#3f524c">|</text>
    <text x="494" y="0" fill="#C4D2CC">44 languages</text>
    <text x="678" y="0" fill="#3f524c">|</text>
    <text x="702" y="0" fill="#C4D2CC">offline-first</text>
    <text x="868" y="0" fill="#3f524c">|</text>
    <text x="892" y="0" fill="#C4D2CC">open source</text>
  </g>
  <text x="82" y="506" font-size="20" fill="#7E938C" font-weight="500">github.com/rohanbatrain/UPES-ECS</text>
</svg>
