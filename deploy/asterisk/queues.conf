[general]
persistentmembers=yes

; ERT emergency queue — members are generic POSITIONS (see SOP 30), not people.
[ert_emergency_queue]
strategy=ringall
timeout=20
retry=1
maxlen=0
ringinuse=no
; Disaster-ready fast-path: while waiting, the caller can press 1 to break out to
; immediate first-aid guidance (ctx_111_fastpath), and is reminded to do so.
context=ctx_111_fastpath
periodic-announce=upes-ecs/hold-firstaid
periodic-announce-frequency=15
announce-frequency=0
member => PJSIP/4110,,ERT-Desk-1
member => PJSIP/4111,,ERT-Desk-2
member => PJSIP/4112,,ERT-Desk-3
