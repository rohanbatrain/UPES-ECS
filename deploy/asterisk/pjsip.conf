; UPES-ECS validation PJSIP â€” transport + endpoints for test callers, ERT positions,
; and fixed devices. Real production endpoints come from FreePBX / the provisioning CSVs.

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
; --- Behind NAT / QEMU port-forward (van-laptop) ---
; Set these to the PBX's reachable LAN IP so Asterisk advertises it to phones.
; Needed for NAT/port-forward deployments; leave unset for bridged / native Linux.
;external_media_address=192.168.1.16
;external_signaling_address=192.168.1.16

; --- WebSocket transport for the UPES Safe mobile app (SIP-over-WS + WebRTC media) ---
; The listener itself is res_http_websocket (see http.conf, port 8088). This transport
; just tells chan_pjsip to accept ws. App connects to ws://<pbx-lan-ip>:8088/ws
[transport-ws]
type=transport
protocol=ws
bind=0.0.0.0

; App endpoints use this template instead of (endpoint-tpl). webrtc=yes turns on the
; WebRTC media profile (AVPF, DTLS-SRTP, ICE, rtcp-mux) so flutter_webrtc can talk to it;
; dtls_auto_generate_cert lets Asterisk self-sign, so there are NO cert files to manage.
; Codecs include ulaw so a call to/from a plain-UDP ERT phone needs no transcoding.
[endpoint-webrtc-tpl](!)
type=endpoint
disallow=all
allow=opus
allow=ulaw
allow=alaw
webrtc=yes
dtls_auto_generate_cert=yes
transport=transport-ws
rewrite_contact=yes
rtp_symmetric=yes
force_rport=yes
direct_media=no
dtmf_mode=auto
timers=no

;=== templates ===
[endpoint-tpl](!)
type=endpoint
disallow=all
allow=ulaw
allow=alaw
rewrite_contact=yes
dtmf_mode=auto             ; accept RFC4733 (default) AND in-band DTMF, so a "press 1" is
                           ; detected regardless of the softphone's DTMF setting
rtp_symmetric=yes          ; return media to where it came from (mobile/Wi-Fi NAT)
force_rport=yes            ; respond to the source port (NAT traversal)
direct_media=no            ; relay RTP through the PBX (fixes no-audio when PBX is behind NAT)
timers=no                  ; disable SIP session-timers (RFC 4028). Behind QEMU SLIRP NAT the
                           ; periodic re-INVITE/UPDATE refresh can fail, which tears the call
                           ; down mid-call (~30s) even though media is fine. On an isolated LAN
                           ; session-timers add no value — turning them off stops the auto-drop.
rtp_timeout=120            ; REAP DEAD LEGS. Hang up a channel that has received NO inbound RTP for
                           ; 120s. This is the liveness net that REPLACES the disabled session-timers
                           ; above: a caller whose SIP BYE was lost (NAT/Wi-Fi drop, app kill) would
                           ; otherwise leave a ZOMBIE channel Up forever, because the coach menu loops
                           ; by design and never self-hangs-up. Unlike session-timers this watches
                           ; MEDIA only (no re-INVITE), so the QEMU-NAT issue that forced timers=no
                           ; does not affect it. A live caller keeps RTP flowing even when silent, so
                           ; this never drops a real call; only truly-dead media (0 packets in) is
                           ; reaped -- and the incident was already logged on entry, so the missed
                           ; follow-up still calls them back. Tune up (e.g. 300) for extra caution.
rtp_timeout_hold=180       ; same, but while the call is on hold (media legitimately paused)

[auth-tpl](!)
type=auth
auth_type=userpass

[aor-tpl](!)
type=aor
max_contacts=2            ; students=2 devices (spec). Positions tolerate a 2nd contact fine.
remove_existing=yes       ; a fresh REGISTER from a new port/IP EVICTS the phone's own stale
                          ; contact instead of being refused ("will exceed max contacts").
                          ; Without this, a mobile softphone that changes ports (Wi-Fi/NAT
                          ; rebind, app restart) connects once then can never re-register.

;-------------------------------------------------------------------
; Macro pattern per endpoint: [ext] endpoint + [ext] auth + [ext] aor
;-------------------------------------------------------------------

;=== test caller (student context) ===

; All caller / position accounts live in the authoritative accounts file:
#include pjsip_accounts.conf
