; ============================================================================
; UPES-ECS - pjsip_accounts.example.conf   (TEMPLATE — safe to commit)
;
; This is a SANITISED template. The live file, pjsip_accounts.conf, contains
; REAL SIP secrets and is git-ignored (never commit it, never web-serve it).
;
; #included by pjsip.conf AFTER the (endpoint-tpl)/(auth-tpl)/(aor-tpl) templates.
;
; DO NOT hand-add users or edit passwords in the live file. It is the SINGLE
; SOURCE OF TRUTH — use deploy/qemu/Add-UpesUser.ps1 so the same secret is pinned
; here + secrets/TEAM-CREDENTIALS.md + the live VM (no drift).
; Procedure: deploy/qemu/ADD-USER-RUNBOOK.md
;
; Passwords below are placeholders. Add-UpesUser.ps1 replaces __SET_ON_IMPORT__
; with a generated secret the first time an account is imported.
; ============================================================================

; === People — personal accounts (login on the person's own handset) ===
[500000001](endpoint-tpl)
context=ctx_student
auth=500000001
aors=500000001
callerid=Student Example One <500000001>
[500000001](auth-tpl)
username=500000001
password=__SET_ON_IMPORT__
[500000001](aor-tpl)

; === Staff ===
[40000001](endpoint-tpl)
context=ctx_staff
auth=40000001
aors=40000001
callerid=Staff Member One <40000001>
[40000001](auth-tpl)
username=40000001
password=__SET_ON_IMPORT__
[40000001](aor-tpl)

; === ERT responder position (role login, not a person) ===
