; UPES-ECS -- Asterisk built-in HTTP server.
; Enabled ONLY to provide the WebSocket transport (res_http_websocket) that the
; UPES Safe mobile app uses for SIP-over-WS calling. No TLS: this is a trusted,
; internet-isolated campus LAN (same posture as the plain-UDP softphones).
; The app connects to  ws://<pbx-lan-ip>:8088/ws
[general]
enabled=yes
bindaddr=0.0.0.0
bindport=8088
; tlsenable stays off -- native mobile apps (flutter_webrtc) do not require wss,
; unlike browsers. Turn on tls + certs only if you later expose this off-campus.
tlsenable=no
