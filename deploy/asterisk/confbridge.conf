; UPES-ECS ConfBridge profiles for the incident command rooms (9000-9004).
; Referenced by ctx_conference in extensions_custom.conf.
[general]

; Main Incident Command Room (9000) — larger, recorded when activated for a real incident
[upes_incident_bridge]
type=bridge
max_members=20
; record_conference is set per-call in the dialplan (Set(CONFBRIDGE(bridge,record_conference)=yes))

; Side coordination rooms (9001-9004) — smaller, not recorded by default
[upes_side_bridge]
type=bridge
max_members=10

; Standard participant profile — announce join/leave for situational awareness
[upes_user]
type=user
announce_join_leave=yes
