# UPES-ECS fail2ban jail for Asterisk — bans IPs after repeated auth failures.
# Install to /etc/fail2ban/jail.d/asterisk.conf, then: systemctl restart fail2ban
# (Applied live on the QEMU VM; see SOP 26 for the full hardening plan.)
[asterisk]
enabled  = true
maxretry = 5
findtime = 600
bantime  = 3600
logpath  = /var/log/asterisk/messages
