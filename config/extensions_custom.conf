; ============================================================================
; UPES-ECS — extensions_custom.conf  (REFERENCE / STARTER)
; ============================================================================
; This file holds the UPES-ECS emergency dialplan that lives ALONGSIDE FreePBX.
; FreePBX generates the bulk config; put custom emergency logic here so it
; survives reloads and is version-controlled in the `upes-ecs-config` git repo.
;
; HOW TO USE:
;   1. Edit paths, extensions, prompt files, and the backup roster to match your site.
;   2. In FreePBX, route 111 / 199 to a "Custom Destination" that jumps into the
;      contexts below (e.g. Custom Destination target: ctx_emergency_111,111,1).
;   3. Have each user's extension context `include` the role context it needs
;      (or map via Class of Service). 111 + 199 are included by every user context.
;   4. Apply Config, then TEST with 199 before 111.
;
; Prompts referenced as upes-ecs/<name> live under the Asterisk sounds dir
; (e.g. /var/lib/asterisk/sounds/en/upes-ecs/).  Record them per the SOP wording.
; Helper scripts live in /opt/upes-ecs/ (see scripts/ in this repo).
;
; DISASTER-READY 111 FLOW (see Blueprint/03-Call-Flows.md §2):
;   111 -> record + incident ID -> Queue(ert_emergency_queue, 20s)
;          • caller may press 1 ANY TIME -> ctx_111_fastpath -> immediate first-aid
;   no human in 20s -> ctx_escalation:
;          • alert_responders.sh rings Lead + backup in the BACKGROUND (non-blocking)
;          • Goto ctx_ai_helpline -> OFFLINE panic-coach starts at once (logs incident)
;   coach: 1-7 first-aid topics · 9 = retry a responder (re-queue) · 8 = voicemail
;   The caller is coached in parallel with reaching a human; nothing is a dead end;
;   every fallback works with ZERO internet. 101 (online AI, AVA+Gemini) is a future
;   layer that only upgrades this when connected — see AI-101/ and SOP 19.
; ============================================================================

; ------------------------------------------------------------------
; Globals — tune these to your site
; ------------------------------------------------------------------
[globals]
UPES_QUEUE=ert_emergency_queue
UPES_LEAD=4101                 ; ERT Lead / Incident Commander
UPES_BACKUP=PJSIP/4300&PJSIP/4200&PJSIP/4400   ; Security + Medical + Warden
UPES_QTIMEOUT=20
UPES_ESC_TIMEOUT=20
UPES_VM_BOX=emergency          ; voicemail box (emergency@upes-ecs)
UPES_REC_DIR=/var/spool/asterisk/monitor/upes-ecs
UPES_BIN=/opt/upes-ecs
PAGING_PIN_700=CHANGE-ME       ; generated per-site at build (setup-in-vm.sh); recorded in secrets
UPES_DRILL_TARGET=             ; optional PJSIP dial-string for 199 drills; empty = confirm-only
; Paging speaker dial-strings per zone. Empty until real IP speakers are provisioned
; (a page to an empty target simply reaches nobody — no error). ALLCAMPUS_SPEAKERS is
; also set in the wiring file; define the rest here.
ACADEMIC_SPEAKERS=
HOSTEL_SPEAKERS=
GATE_SPEAKERS=
MEDICAL_SPEAKERS=
ADMIN_SPEAKERS=

; ==================================================================
; LANGUAGE ROUTING — resolve the caller's spoken language ONCE per call.
; ==================================================================
; Sets CHANNEL(language) so EVERY downstream Playback/Background/Read/VoiceMail
; is served from  sounds/<lang>/upes-ecs/...  (Asterisk falls back to sounds/en/
; per-file for anything not yet translated — so this is always safe).
;
; Resolution order (all offline, instant astdb lookups; NO internet, NO DB server):
;   1. lang/<caller-ext>  — the caller's personal preference (set from the app /
;                           directory.json via Add-UpesUser -Lang / Sync-LangDb).
;   2. lang/_default      — the campus-wide default (Install-UpesEcs -Language).
;   3. en                 — the built-in, always-complete fallback pack.
;
; CHANNEL(language) is inherited across Goto within the same channel, so calling
; this ONCE at each entry point (111 / 102 / 199) localises the whole flow,
; including the escalation + panic-coach it Gotos into. Gosub it, don't include it.
[sub_setlang]
exten => s,1,Set(CHANNEL(language)=${DB(lang/${CALLERID(num)})})
 same => n,ExecIf($["${CHANNEL(language)}"=""]?Set(CHANNEL(language)=${DB(lang/_default)}))
 same => n,ExecIf($["${CHANNEL(language)}"=""]?Set(CHANNEL(language)=en))
 same => n,NoOp(LANG=${CHANNEL(language)} for caller ${CALLERID(num)})
 same => n,Return()

; ==================================================================
; EMERGENCY HOTLINE — 111  (the ONE campus emergency number)
; ==================================================================
[ctx_emergency_111]
exten => 111,1,NoOp(EMERGENCY_111_CALL from ${CALLERID(num)})
 same => n,Set(CDR(userfield)=EMERGENCY_111_CALL)
 same => n,Set(__INCIDENT_ID=${SHELL(${UPES_BIN}/incident_id.sh)})   ; ERT-YYYYMMDD-NNNN
 same => n,Set(__INCIDENT_ID=${FILTER(A-Z0-9\-,${INCIDENT_ID})})     ; strip newline/junk
 same => n,Set(CDR(accountcode)=${INCIDENT_ID})
 same => n,Set(MIXMONITOR_FILENAME=${UPES_REC_DIR}/${INCIDENT_ID}_${CALLERID(num)}_${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}.wav)
 same => n,MixMonitor(${MIXMONITOR_FILENAME})                        ; record WHOLE call (Feature 4: incl. hold + voicemail), not bridge-only
 same => n,Answer()
 same => n,Gosub(sub_setlang,s,1)                                    ; resolve caller language -> localises the WHOLE 111 flow (queue, escalation, coach)
 ; The prompt says "press 1 at any time", so it MUST honour a keypress. Use Read() (not a
 ; digit extension): it plays the prompt, is interrupted the instant a key is pressed, and
 ; stores it in ${FA} — WITHOUT creating an 'exten => 1' that would collide with 102/111
 ; (a bare digit-1 extension makes pressing 1 wait for the inter-digit timeout, and pressing
 ; it 3x literally dials 111 and restarts the call). maxdigits=1, 1 attempt, 4s post-prompt.
 same => n,Read(FA,upes-ecs/emergency-preanswer,1,,1,4)             ; "...recorded. Stay on the line. Press 1 for first-aid."
 same => n,GotoIf($["${FA}"="1"]?ctx_111_fastpath,1,1)             ; pressed 1 -> first-aid NOW
 ; How many answer points are actually free right now? If none, go STRAIGHT to the
 ; coach — never leave the caller in dead-air waiting on a queue that can't ring anyone
 ; (this also fixes self-testing: the sole on-shift phone calling 111 reaches the coach).
 same => n,Set(QAVAIL=${QUEUE_MEMBER(${UPES_QUEUE},ready)})     ; ready = device 'Not in use', not paused (Asterisk 18 has no 'available' option)
 same => n,GotoIf($[${QAVAIL} < 1]?nostaff)
 same => n,Queue(${UPES_QUEUE},t,,,${UPES_QTIMEOUT})                ; ring available answer points, 20s (press 1 = fast-path)
 same => n,GotoIf($["${QUEUESTATUS}"="TIMEOUT"]?nostaff)            ; nobody picked up -> coach
 same => n,GotoIf($["${QUEUESTATUS}"="LEAVEEMPTY"]?nostaff)
 same => n,GotoIf($["${QUEUESTATUS}"="JOINEMPTY"]?nostaff)
 same => n,Hangup()                                                ; a responder handled it
 same => n(nostaff),Goto(ctx_escalation,s,1)                       ; -> background alert + offline coach
 same => n,Hangup()

; (Front-door press-1 is handled by the Read(FA,...) above — no ambiguous 'exten => 1' here.)

; 111 is the ONE campus emergency number. 100 is DEPRECATED and no longer routed:
; some softphones hijack 100 as "Police", so the campus standardised on 111 — a number
; the handset won't intercept. Do NOT re-add a 100 alias.

; 102 — direct test dial for the offline panic-coach (guidance line), no incident logged
exten => 102,1,NoOp(PANIC-COACH test dial from ${CALLERID(num)})
 same => n,Answer()
 same => n,Gosub(sub_setlang,s,1)                                    ; coach test speaks the caller's language too
 same => n,Goto(ctx_ai_helpline,test,1)

; Silent / can't-speak handling is procedural (ERT SOP Part I). Optional DTMF cue:
; a responder can invite "press any key" once answered; no separate number by design.

; ==================================================================
; ESCALATION CHAIN
; ==================================================================
; Disaster-ready: when the queue times out, DO NOT hold the caller through serial
; ring-outs (that delayed first-aid by 40-60s). Instead alert the Lead + backup in
; the BACKGROUND (non-blocking call-files that ring them + let them re-join the queue)
; and IMMEDIATELY begin coaching — never leave a caller in silence. The coach's
; "9 = retry a responder" re-queues and bridges whoever has since become free.
; (EMD principle: begin pre-arrival instructions at once; keep reaching a human too.)
[ctx_escalation]
exten => s,1,NoOp(No responder for ${INCIDENT_ID} - background alert + coach)
 same => n,System(${UPES_BIN}/alert_responders.sh "${INCIDENT_ID}" "${CALLERID(num)}")
 same => n,Goto(ctx_ai_helpline,s,1)

; ------------------------------------------------------------------
; 111 FAST-PATH — caller pressed 1 while queued (queues.conf context=ctx_111_fastpath)
; Jump straight to first-aid guidance; still alert responders in the background.
; ------------------------------------------------------------------
[ctx_111_fastpath]
exten => 1,1,NoOp(FAST-PATH first-aid ${INCIDENT_ID} from ${CALLERID(num)})
 same => n,System(${UPES_BIN}/alert_responders.sh "${INCIDENT_ID}" "${CALLERID(num)}")
 same => n,Goto(ctx_ai_helpline,fastpath,1)

; ------------------------------------------------------------------
; RESPONDER ALERT — target of the background call-files (alert_responders.sh).
; Rings the Lead/backup, speaks the alert, and lets them press 1 to (re)join the queue.
; ------------------------------------------------------------------
[ctx_responder_alert]
exten => s,1,Answer()
 same => n,Playback(upes-ecs/responder-alert)
 same => n,WaitExten(8)
 same => n,Hangup()
exten => 1,1,AddQueueMember(${UPES_QUEUE},PJSIP/${RESP_EXT},0,,Alert-${RESP_EXT})
 same => n,Playback(upes-ecs/queue-resumed)
 same => n,Hangup()
exten => t,1,Hangup()
exten => i,1,Hangup()

; ==================================================================
; EMERGENCY VOICEMAIL + MISSED INCIDENT
; ==================================================================
[ctx_emergency_vm]
exten => s,1,NoOp(Unanswered emergency ${INCIDENT_ID})
 same => n,Playback(upes-ecs/emergency-voicemail-prompt)
 same => n,Set(TIMEOUT(absolute)=75)                               ; guard: 60s msg + margin
 same => n,VoiceMail(${UPES_VM_BOX}@upes-ecs,u)                    ; "unavailable" msg
 same => n,System(${UPES_BIN}/missed_incident.sh "${INCIDENT_ID}" "${CALLERID(num)}" "${CALLERID(name)}" critical pending)
 same => n,Hangup()
; Early hangup before this point: create a missed record with no voicemail.
exten => h,1,GotoIf($["${DIALSTATUS}"="ANSWER"]?end)
 same => n,System(${UPES_BIN}/missed_incident.sh "${INCIDENT_ID}" "${CALLERID(num)}" "${CALLERID(name)}" critical pending-novm)
 same => n(end),NoOp(end)

; ==================================================================
; DRILL / TEST — 199   (NO real dispatch, NO real escalation)
; ==================================================================
[ctx_drill_199]
exten => 199,1,NoOp(DRILL-ONLY test from ${CALLERID(num)})
 same => n,Set(CDR(accountcode)=DRILL-ONLY)
 same => n,Set(CDR(userfield)=DRILL_199)
 same => n,Answer()
 same => n,Gosub(sub_setlang,s,1)                                  ; drill speaks the caller's language too
 same => n,Set(MIXMONITOR_FILENAME=${UPES_REC_DIR}/DRILL_${CALLERID(num)}_${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}.wav)
 same => n,MixMonitor(${MIXMONITOR_FILENAME})                      ; record whole drill call
 same => n,Playback(upes-ecs/drill-prompt)                         ; "This is a UPES-ECS drill call..."
 ; Optionally ring a real drill target if one is provisioned (global UPES_DRILL_TARGET);
 ; otherwise just confirm — never fail the drill on a phantom endpoint (was PJSIP/ert-test-target).
 same => n,GotoIf($["${UPES_DRILL_TARGET}" = ""]?nodial)
 same => n,Dial(${UPES_DRILL_TARGET},20)
 same => n(nodial),Playback(demo-echotest)                        ; short audio-path confirmation
 ; (MixMonitor above records the whole drill call)
 same => n,Hangup()

; Echo/audio test — 198
[ctx_echo_198]
exten => 198,1,Answer()
 same => n,Playback(demo-echotest)
 same => n,Echo()
 same => n,Hangup()

; ==================================================================
; PAGING — 700-799  (authorized contexts only)
; ==================================================================
[ctx_paging]
exten => 700,1,NoOp(All-campus paging by ${CALLERID(num)})
 same => n,Authenticate(${PAGING_PIN_700})                         ; PIN for all-campus
 same => n,Set(CDR(userfield)=PAGING_700_ALLCAMPUS)
 same => n,System(${UPES_BIN}/log_paging.sh "${CALLERID(num)}" 700 allcampus)
 same => n,Page(${ALLCAMPUS_SPEAKERS},d)
 same => n,Hangup()
exten => 701,1,Set(CDR(userfield)=PAGING_701_ACADEMIC)
 same => n,System(${UPES_BIN}/log_paging.sh "${CALLERID(num)}" 701 academic)
 same => n,Page(${ACADEMIC_SPEAKERS},d)
 same => n,Hangup()
; 702 Hostels, 703 Security gates, 704 Medical/ERT, 705 Admin/Ops — same pattern.

; ==================================================================
; CONFERENCE ROOMS — 9000-9004  (authorized contexts only)
; ==================================================================
[ctx_conference]
exten => 9000,1,NoOp(Main Incident Command Room)
 same => n,System(${UPES_BIN}/log_conf.sh "${CALLERID(num)}" 9000 join)
 same => n,Set(CONFBRIDGE(bridge,record_conference)=yes)          ; 9000 recorded when active
 same => n,ConfBridge(9000,upes_incident_bridge,upes_user,${PIN_9000})
 same => n,System(${UPES_BIN}/log_conf.sh "${CALLERID(num)}" 9000 leave)
 same => n,Hangup()
exten => 9001,1,ConfBridge(9001,upes_side_bridge,upes_user,${PIN_9001})   ; side rooms not recorded by default
; 9002 Medical, 9003 Warden, 9004 Operations — same pattern.

; ==================================================================
; RESPONDER PAUSE / RESUME — *45 / *46  (ERT contexts)
; ==================================================================
[ctx_queue_control]
exten => *45,1,QueuePause(${UPES_QUEUE},PJSIP/${CALLERID(num)})
 same => n,Playback(upes-ecs/queue-paused)
 same => n,Hangup()
exten => *46,1,QueueUnpause(${UPES_QUEUE},PJSIP/${CALLERID(num)})
 same => n,Playback(upes-ecs/queue-resumed)
 same => n,Hangup()

; ==================================================================
; ACCESS-DENIED CATCH  (jump here when a context is not allowed a feature)
; ==================================================================
[ctx_denied]
exten => _X.,1,NoOp(Access denied: ${CALLERID(num)} -> ${EXTEN})
 same => n,System(${UPES_BIN}/log_access_denied.sh "${CALLERID(num)}" "${EXTEN}")
 same => n,Playback(upes-ecs/not-authorized)
 same => n,Hangup()

; ==================================================================
; ROLE CONTEXTS  (assign these to extensions / map via Class of Service)
; Each includes ONLY what its role may reach. 111 + 199 + 198 everywhere.
; ==================================================================
[ctx_student]
include => ctx_emergency_111
include => ctx_drill_199
include => ctx_echo_198
; Internal human calling, NOT recorded. UPES uses TWO real ID formats:
;   9-digit SAP IDs (students)   e.g. 500120597  -> _5XXXXXXXX
;   8-digit employee IDs (staff) e.g. 40000001   -> _4XXXXXXX
; 4-digit fixed devices (4xxx) are separate (different length) and ERT-only.
exten => _+91X.,1,Goto(${EXTEN:3},1)                  ; strip +91 country code some softphones auto-prepend
exten => _5XXXXXXXX,1,Dial(PJSIP/${EXTEN},30)         ; student-to-student
 same => n,Hangup()
; NOTE: no include of ctx_paging / ctx_conference / ctx_queue_control

[ctx_staff]
include => ctx_student            ; students callable per base rules
; staff-to-staff (8-digit employee IDs) — enable student->staff separately per policy
exten => _4XXXXXXX,1,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()

[ctx_ert]
include => ctx_staff
include => ctx_conference
include => ctx_queue_control
; ERT may dial fixed emergency devices directly
exten => _4XXX,1,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()

[ctx_ert_lead]
include => ctx_ert
include => ctx_paging              ; Lead may page (700 still needs PIN)

[ctx_responder]
; Department responders (Medical, Security, Warden, Ops, IT) — generic POSITIONS
; staffed by shift (SOP 30), same model as ERT. They are DISPATCH TARGETS: they
; receive handoffs and coordinate, but do NOT answer the 111 queue, cannot page
; all-campus, and cannot control the ERT queue.
include => ctx_staff               ; base calling + 111/199/198
include => ctx_conference          ; join coordination rooms (9000-9004)
exten => _4XXX,1,Dial(PJSIP/${EXTEN},30)   ; reach ERT + other responder positions/fixed
 same => n,Hangup()

[ctx_responder_lead]
; Department-lead position (e.g. Security Lead 4301). Same base capabilities as a
; responder today — it is a DISTINCT context so a lead seat is identifiable in CDR/logs
; and is the seam for future elevated department-lead grants (e.g. own-zone paging,
; coordination-room moderation) once approved & implemented. Do NOT grant all-campus
; paging or 111-queue control here — those stay ERT-only.
include => ctx_responder

[ctx_control_room]
include => ctx_ert_lead

[ctx_fixed_device]
include => ctx_emergency_111
include => ctx_drill_199
; device-scoped dialing only — lock down per device (e.g. speaker = receive paging only)

[ctx_admin]
include => ctx_control_room
; management extensions

; ============================================================================
; END. Test order after any change: 199 (drill) -> 111 -> student-to-student.
; ============================================================================
