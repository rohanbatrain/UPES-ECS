; ============================================================================
; UPES-ECS feature wiring — attaches the feature contexts (extensions_features.conf)
; onto the role contexts (extensions_custom.conf) using the (+) append syntax.
; #include this AFTER extensions_custom.conf and extensions_features.conf.
; Role inheritance (from extensions_custom.conf): ctx_staff⊃ctx_student,
; ctx_ert⊃ctx_staff, ctx_ert_lead⊃ctx_ert, ctx_control_room⊃ctx_ert_lead,
; ctx_responder⊃ctx_staff — so an include added low is inherited upward.
; ============================================================================

[ctx_student](+)
include => ctx_sos              ; *77 silent SOS/duress — everyone
include => ctx_callback         ; 105 request callback — everyone
include => ctx_setlang          ; *55 set-my-language (self-service) — everyone
; NOTE: ctx_shift (*22/*23) is deliberately NOT here. Going "on shift" joins the live
; 111 emergency queue and means answering real emergencies — that is an ERT ROLE,
; not something a student's personal account may do. ERT = generic positions (4101,
; 4110-4113, 4120) that a TRAINED person logs into per shift; the *22/*23 feature is
; wired onto ctx_ert only (below). A student can never self-join the ERT queue.

[ctx_staff](+)
include => ctx_departments      ; 211-215 department hunt groups
include => ctx_directory        ; 411 dial-by-name

[ctx_ert](+)
include => ctx_intercom         ; *80<ext> intercom / auto-answer
include => ctx_bridge_quick     ; *9 one-tap incident bridge (9000)
include => ctx_shift            ; *22/*23 shift on/off — ERT positions ONLY (trained role logins)

[ctx_ert_lead](+)
include => ctx_announce         ; 720-723 pre-recorded announcements

[ctx_admin](+)
include => ctx_intercom

; --- placeholder globals the feature contexts reference (tune per site) ---
[globals]
ALLCAMPUS_SPEAKERS=PJSIP/4700        ; IP speakers / paging endpoints (none yet)
ERT_ALERT_ZONE=PJSIP/4110&PJSIP/4111 ; where *77 silent-SOS alerts land
ONCALL_TRUNK=                        ; follow-me trunk (empty = disabled)
ONCALL_MOBILE=                       ; follow-me mobile number
