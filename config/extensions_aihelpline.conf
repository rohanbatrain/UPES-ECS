; ============================================================================
; UPES-ECS — OFFLINE PANIC-COACH  (ctx_ai_helpline)
; ----------------------------------------------------------------------------
; The automated emergency guidance line that engages when NO responder answers
; 111 (queue empty/timeout AND escalation to ERT-Lead/backup unanswered).
; It is fully OFFLINE and deterministic — a calm, scripted decision tree that
; coaches the caller through what to do, while the missed incident is logged so
; a human calls back. No internet, no AI service, no dependencies beyond the
; pre-generated voice prompts (scripts/gen-coach-prompts.sh).
;
; Entry points:
;   s     -> real fallback: logs the missed incident, then coaches
;   test  -> dial 102: coaches WITHOUT logging a real incident (for testing)
;
; #include AFTER extensions_custom.conf (uses its globals: UPES_BIN, UPES_QUEUE,
; UPES_QTIMEOUT, UPES_VM_BOX). Reached only via Goto — never included into a
; user context (its 0-9 menu digits must not collide with normal dialling).
; ============================================================================

[ctx_ai_helpline]

; ---- real fallback entry (from ctx_escalation when nobody is available) ----
exten => s,1,NoOp(PANIC-COACH fallback for ${INCIDENT_ID} from ${CALLERID(num)})
 same => n,System(${UPES_BIN}/missed_incident.sh "${INCIDENT_ID}" "${CALLERID(num)}" "${CALLERID(name)}" critical coaching)
 same => n,Answer()
 same => n,Background(upes-ecs/coach/intro)     ; interruptible: a keypress (e.g. 1) jumps straight to that topic
 same => n,Goto(menu,1)

; ---- fast-path entry (caller pressed 1 during the 111 queue): first-aid NOW ----
; A responder is still being alerted in the background and may join; we start
; guidance immediately instead of making the caller wait out the queue.
exten => fastpath,1,NoOp(PANIC-COACH fast-path first-aid for ${INCIDENT_ID} from ${CALLERID(num)})
 same => n,Answer()
 same => n,System(${UPES_BIN}/missed_incident.sh "${INCIDENT_ID}" "${CALLERID(num)}" "${CALLERID(name)}" critical fastpath-firstaid)
 same => n,Background(upes-ecs/coach/fastpath-intro)   ; interruptible
 same => n,Goto(menu,1)

; ---- test / direct entry (dial 102): coach, no incident logged ----
exten => test,1,NoOp(PANIC-COACH TEST from ${CALLERID(num)})
 same => n,Answer()
 same => n,Background(upes-ecs/coach/intro-test)   ; interruptible
 same => n,Goto(menu,1)

; ---- the situation menu (loops forever; NEVER auto-hangs-up an emergency caller) ----
; Golden rule: never drop an emergency call silently. A silent caller may be injured,
; unconscious, or have the phone on the ground — hanging up on them is the worst outcome.
; So on repeated silence we DO NOT go to voicemail-and-hangup. Instead every few cycles
; we re-alert a human in the background (they may have missed the first page) and keep the
; line open and recording. The caller can still choose to leave a message by pressing 8.
exten => menu,1,Set(TRIES=0)
 same => n(top),Background(upes-ecs/coach/menu)
 same => n,WaitExten(12)
 ; WaitExten routes a 12s silence to exten 't', a pressed topic-digit to that exten, and an
 ; invalid key to 'i' -- so control ALWAYS leaves 'menu' at this line. The silent-cycle counter
 ; and the "re-page a human every 3rd cycle" safety net therefore live in 't' (below), NOT here
 ; (they were previously placed after WaitExten where they were unreachable dead code). This
 ; Goto is a defensive backstop: if 't' were ever removed, WaitExten's timeout would fall through
 ; to here and re-loop instead of running off the end of the dialplan (which hangs up the caller).
 same => n,Goto(top)

; ---- guidance topics (each returns to the menu with the counter reset) ----
exten => 1,1,Playback(upes-ecs/coach/cpr)
 same => n,Goto(again,1)
exten => 2,1,Playback(upes-ecs/coach/bleeding)
 same => n,Goto(again,1)
exten => 3,1,Playback(upes-ecs/coach/choking)
 same => n,Goto(again,1)
exten => 4,1,Playback(upes-ecs/coach/fire)
 same => n,Goto(again,1)
exten => 5,1,Playback(upes-ecs/coach/lockdown)
 same => n,Goto(again,1)
exten => 6,1,Playback(upes-ecs/coach/recovery)
 same => n,Goto(again,1)
exten => 7,1,Playback(upes-ecs/coach/trapped)
 same => n,Goto(again,1)

; ---- 0 repeat options | 9 retry a responder | 8 leave a message ----
exten => 0,1,Goto(menu,top)
exten => 9,1,Playback(upes-ecs/coach/tryagain)
 same => n,Queue(${UPES_QUEUE},t,,,${UPES_QTIMEOUT})
 same => n,Playback(upes-ecs/coach/noresponder)
 same => n,Goto(again,1)
exten => 8,1,Goto(leave,1)

; ---- * = change language mid-call (ephemeral: this call only) ----
; Runtime override of CHANNEL(language) for callers whose profile language is wrong
; (guest handset, shared device, or a preference not yet set). Re-plays the menu in the
; chosen language. Uses Read() (single-digit capture into LANGSEL) NOT digit extensions,
; so the 1/2 pressed here can NEVER collide with the coach's 1-9 first-aid topics.
; To add a language: ship its sounds/<code>/ pack, add a branch below, and re-record
; upes-ecs/coach/pick-language to name the new option.
exten => *,1,NoOp(LANGUAGE CHOOSER from ${CALLERID(num)} (was ${CHANNEL(language)}))
 same => n,Read(LANGSEL,upes-ecs/coach/pick-language,1,,1,6)   ; "press 1 English, 2 Hindi"
 same => n,GotoIf($["${LANGSEL}"="1"]?seten)
 same => n,GotoIf($["${LANGSEL}"="2"]?sethi)
 same => n,Goto(menu,top)                                      ; no/other choice -> keep current language
 same => n(seten),Set(CHANNEL(language)=en)
 same => n,Goto(menu,top)
 same => n(sethi),Set(CHANNEL(language)=hi)
 same => n,Goto(menu,top)

; ---- invalid / helper ----
exten => i,1,Playback(upes-ecs/coach/invalid)
 same => n,Goto(menu,top)
; 't' = WaitExten silence timeout. This is where a non-responsive (possibly injured/unconscious)
; caller lands each 12s cycle. DROP-CRITICAL: keep 't' (and 'i') defined -- without them WaitExten
; can return -1 and hang up the emergency caller. On every 3rd silent cycle re-page a responder in
; the background; never hang up. TRIES persists on the channel (set to 0 in menu,1 and by 'again').
exten => t,1,Set(TRIES=$[${TRIES}+1])
 same => n,GotoIf($[${TRIES} % 3 = 0]?renudge)     ; every 3rd silent cycle, page a human again
 same => n,Playback(upes-ecs/coach/nochoice)
 same => n,Goto(menu,top)
 same => n(renudge),System(${UPES_BIN}/alert_responders.sh "${INCIDENT_ID}" "${CALLERID(num)}")
 same => n,Playback(upes-ecs/coach/nochoice)
 same => n,Goto(menu,top)
exten => again,1,Set(TRIES=0)
 same => n,Goto(menu,top)

; ---- leave a message for the response team (inline; already logged above) ----
exten => leave,1,Playback(upes-ecs/coach/leavemsg)
 same => n,Playback(upes-ecs/emergency-voicemail-prompt)
 same => n,Set(TIMEOUT(absolute)=75)
 same => n,VoiceMail(${UPES_VM_BOX}@upes-ecs,u)
 same => n,Hangup()

; ---- direct test dial: 102 -> coach in test mode (added everywhere via ctx_emergency_111) ----
