; ============================================================================
; UPES-ECS — extensions_features.conf   (FEATURE CONTEXTS)
; ============================================================================
; #include this file ALONGSIDE extensions_custom.conf, e.g. in extensions.conf:
;
;     #include "extensions_custom.conf"
;     #include "extensions_features.conf"
;
; This file ONLY ADDS new contexts. It never redefines an existing context.
; A human wires each feature by adding an `include => ctx_xxx` line to the
; EXISTING role context (in extensions_custom.conf). The exact include lines
; are stated in comments above each feature and collected in FEATURES.md.
;
; NEW GLOBALS this file references — ADD these to the existing [globals] block
; in extensions_custom.conf (do NOT add a second [globals] here):
;     ALLCAMPUS_SPEAKERS  ; PJSIP dial string of all-campus IP speakers (also used by ctx_paging)
;     ERT_ALERT_ZONE      ; PJSIP dial string of ERT alert speakers/desks for silent-SOS
;     ONCALL_TRUNK        ; SIP trunk name for the OPTIONAL follow-me on-call mobile leg
;     ONCALL_MOBILE       ; on-call mobile number reached via ONCALL_TRUNK (follow-me)
; See FEATURES.md "Dependencies" for sound files, voicemail boxes, and group CSVs.
;
; Sound prompts referenced as upes-ecs/<name> live under the Asterisk sounds dir
; (e.g. /var/lib/asterisk/sounds/en/upes-ecs/) and are recorded/generated separately.
; ============================================================================


; ==================================================================
; DEPARTMENT HUNT GROUPS — 211-215
;   Reachable by staff and responders. Students still use 111 only.
;   WIRE IT:  add to [ctx_staff]  ->  include => ctx_departments
;             (ctx_ert already includes ctx_staff, so ERT inherit it;
;              add explicitly to [ctx_ert] too if you tighten ctx_staff)
; ==================================================================
[ctx_departments]
exten => 211,1,NoOp(Dept hunt: SECURITY by ${CALLERID(num)})
 same => n,Set(CDR(userfield)=DEPT_211_SECURITY)
 same => n,Dial(PJSIP/4300,25)
 same => n,GotoIf($["${DIALSTATUS}"="ANSWER"]?hang)
 same => n,Playback(upes-ecs/dept-unavailable)
 same => n(hang),Hangup()

exten => 212,1,NoOp(Dept hunt: MEDICAL by ${CALLERID(num)})
 same => n,Set(CDR(userfield)=DEPT_212_MEDICAL)
 same => n,Dial(PJSIP/4200,25)
 same => n,GotoIf($["${DIALSTATUS}"="ANSWER"]?hang)
 same => n,Playback(upes-ecs/dept-unavailable)
 same => n(hang),Hangup()

exten => 213,1,NoOp(Dept hunt: WARDEN by ${CALLERID(num)})
 same => n,Set(CDR(userfield)=DEPT_213_WARDEN)
 same => n,Dial(PJSIP/4400,25)
 same => n,GotoIf($["${DIALSTATUS}"="ANSWER"]?hang)
 same => n,Playback(upes-ecs/dept-unavailable)
 same => n(hang),Hangup()

exten => 214,1,NoOp(Dept hunt: OPS by ${CALLERID(num)})
 same => n,Set(CDR(userfield)=DEPT_214_OPS)
 same => n,Dial(PJSIP/4500,25)
 same => n,GotoIf($["${DIALSTATUS}"="ANSWER"]?hang)
 same => n,Playback(upes-ecs/dept-unavailable)
 same => n(hang),Hangup()

exten => 215,1,NoOp(Dept hunt: IT by ${CALLERID(num)})
 same => n,Set(CDR(userfield)=DEPT_215_IT)
 same => n,Dial(PJSIP/4600,25)
 same => n,GotoIf($["${DIALSTATUS}"="ANSWER"]?hang)
 same => n,Playback(upes-ecs/dept-unavailable)
 same => n(hang),Hangup()


; ==================================================================
; DIAL-BY-NAME DIRECTORY — 411
;   Directory() reads names from voicemail.conf. DEPENDENCY: each user/dept
;   must have a voicemail box in the "upes-ecs" VM context (voicemail.conf)
;   with a full name, or they will NOT appear. Today only "emergency" exists.
;   WIRE IT:  add to [ctx_staff]  ->  include => ctx_directory
;             (also reachable by ERT via ctx_staff include)
; ==================================================================
[ctx_directory]
exten => 411,1,NoOp(Dial-by-name directory by ${CALLERID(num)})
 same => n,Answer()
 ; Directory(vm-context,dial-context[,options]); default search = last name.
 ; Add option 'f' to search by first name. Dials the picked ext in ctx_staff.
 same => n,Directory(upes-ecs,ctx_staff)
 same => n,Hangup()


; ==================================================================
; INTERCOM / AUTO-ANSWER — *80<ext>     (ERT / admin only)
;   Adds an auto-answer header so the target phone answers hands-free.
;   Header support is phone-dependent (Polycom/Grandstream/Yealink differ);
;   we send BOTH the Call-Info answer-after=0 and Alert-Info: Auto Answer.
;   WIRE IT:  add to [ctx_ert]   ->  include => ctx_intercom
;             add to [ctx_admin] ->  include => ctx_intercom
; ==================================================================
[ctx_intercom]
exten => _*80X.,1,NoOp(INTERCOM auto-answer to ${EXTEN:3} by ${CALLERID(num)})
 same => n,Set(TARGET=${EXTEN:3})
 same => n,Set(CDR(userfield)=INTERCOM_${TARGET})
 ; b() runs a gosub ON the callee channel BEFORE it rings, so PJSIP_HEADER(add,...)
 ; is applied to the outbound INVITE to the target (the correct way in PJSIP).
 same => n,Dial(PJSIP/${TARGET},20,b(ctx_intercom_predial^addhdr^1))
 same => n,Hangup()

; Helper context — NOT included by any role; only reached via the b() handler above.
[ctx_intercom_predial]
exten => addhdr,1,Set(PJSIP_HEADER(add,Call-Info)=<sip:${CALLERID(num)}>\;answer-after=0)
 same => n,Set(PJSIP_HEADER(add,Alert-Info)=Auto Answer)
 same => n,Return()


; ==================================================================
; ONE-TAP INCIDENT BRIDGE — *9      (ERT contexts only)
;   Jumps into the existing Main Incident Command ConfBridge room 9000
;   (defined in extensions_custom.conf [ctx_conference]).
;   WIRE IT:  add to [ctx_ert] -> include => ctx_bridge_quick
;             (ctx_ert_lead / ctx_responder / ctx_control_room inherit via includes)
;   NOTE: 9000 is PIN-protected in ctx_conference; the join still prompts for PIN_9000.
; ==================================================================
[ctx_bridge_quick]
exten => *9,1,NoOp(One-tap incident bridge by ${CALLERID(num)})
 same => n,Goto(ctx_conference,9000,1)


; ==================================================================
; SILENT SOS / DURESS — *77         (available to ALL user contexts)
;   Raises a CRITICAL incident with a minimal/no talk path, then pages the
;   ERT alert zone so responders are alerted. Caller hears nothing extra.
;   WIRE IT:  add to [ctx_student] -> include => ctx_sos
;             (ctx_staff/ctx_ert/... inherit it through the ctx_student include chain)
;   DESIGN NOTE (not implemented here): a "duress digit while on 111" option could
;   let a caller already on the emergency line press a hidden digit (e.g. DTMF 9 twice)
;   to flag duress. That belongs in the 111 in-call handler, not this standalone code.
; ==================================================================
[ctx_sos]
exten => *77,1,NoOp(SILENT SOS / DURESS from ${CALLERID(num)})
 same => n,Set(CDR(userfield)=SILENT_SOS)
 same => n,Set(__INCIDENT_ID=${SHELL(${UPES_BIN}/incident_id.sh)})    ; ERT-YYYYMMDD-NNNN
 same => n,Set(__INCIDENT_ID=${FILTER(A-Z0-9\-,${INCIDENT_ID})})      ; strip newline/junk
 same => n,Set(CDR(accountcode)=${INCIDENT_ID})
 same => n,System(${UPES_BIN}/sos_alert.sh "${INCIDENT_ID}" "${CALLERID(num)}" "${CALLERID(name)}")
 ; Alert ERT: A() plays a short prompt to the ERT alert devices; one-way, no talk path.
 same => n,Page(${ERT_ALERT_ZONE},A(upes-ecs/sos-alert)i)
 ; ALTERNATIVE (swap in if you prefer a desk call over a page):
 ; same => n,Dial(PJSIP/4110&PJSIP/4120,15,b(ctx_intercom_predial^addhdr^1))
 same => n,Hangup()


; ==================================================================
; REQUEST CALLBACK — 105            (students + staff)
;   Caller confirms with '1'; the request (ext + time) is logged for ERT to action.
;   Logged inline (no extra helper script) to /var/lib/upes-ecs/callbacks/callbacks.log.
;   WIRE IT:  add to [ctx_student] -> include => ctx_callback
;             (staff inherit via the ctx_student include chain)
; ==================================================================
[ctx_callback]
exten => 105,1,NoOp(Callback request from ${CALLERID(num)})
 same => n,Answer()
 same => n,Read(CONFIRM,upes-ecs/callback-confirm,1,,1,6)              ; "Press 1 to request an ERT callback"
 same => n,GotoIf($["${CONFIRM}"="1"]?log:cancel)
 same => n(log),Set(TS=${STRFTIME(${EPOCH},,%Y-%m-%dT%H:%M:%S%z)})
 same => n,Set(CBNUM=${FILTER(0-9+*#,${CALLERID(num)})})               ; sanitize before shell
 same => n,Set(CBNAME=${FILTER(A-Za-z0-9 ._\-,${CALLERID(name)})})
 ; ';' escaped as '\;' — a bare ';' would start a dialplan comment and truncate this to just
 ; the mkdir (dropping the printf log + logger), the same parse trap that broke the roll-call CSV.
 same => n,System(mkdir -p /var/lib/upes-ecs/callbacks \; printf '%s callback ext=%s name="%s" status=pending\n' '${TS}' '${CBNUM}' '${CBNAME}' >> /var/lib/upes-ecs/callbacks/callbacks.log \; logger -t upes-ecs "CALLBACK request ext=${CBNUM}")
 same => n,Playback(upes-ecs/callback-logged)                          ; "Your callback request has been logged."
 same => n,Hangup()
 same => n(cancel),Playback(upes-ecs/callback-cancelled)
 same => n,Hangup()


; ==================================================================
; PRE-RECORDED ANNOUNCEMENTS — 720-723   (ERT-Lead / control room only)
;   Broadcast a pre-recorded message to all-campus speakers. The A() option
;   delivers the prompt to every paged device (this is how the recording
;   reaches the speakers — a bare Playback would only play to the caller).
;   720-723 live inside the 700-799 paging block; they are RESERVED here and
;   must be recorded in the Numbering Plan so no paging zone reuses them.
;   WIRE IT:  add to [ctx_ert_lead]     -> include => ctx_announce
;             add to [ctx_control_room] -> include => ctx_announce
;   DEPENDENCY: sound files upes-ecs/announce-{evacuate,avoid-area,all-clear,assemble}
;   are generated separately (see FEATURES.md).
; ==================================================================
[ctx_announce]
exten => 720,1,NoOp(ANNOUNCE evacuate by ${CALLERID(num)})
 same => n,Set(CDR(userfield)=ANNOUNCE_720_EVACUATE)
 same => n,System(${UPES_BIN}/log_paging.sh "${CALLERID(num)}" 720 announce-evacuate)
 same => n,Answer()
 same => n,Page(${ALLCAMPUS_SPEAKERS},A(upes-ecs/announce-evacuate)i)
 same => n,Hangup()

exten => 721,1,NoOp(ANNOUNCE avoid-area by ${CALLERID(num)})
 same => n,Set(CDR(userfield)=ANNOUNCE_721_AVOID_AREA)
 same => n,System(${UPES_BIN}/log_paging.sh "${CALLERID(num)}" 721 announce-avoid-area)
 same => n,Answer()
 same => n,Page(${ALLCAMPUS_SPEAKERS},A(upes-ecs/announce-avoid-area)i)
 same => n,Hangup()

exten => 722,1,NoOp(ANNOUNCE all-clear by ${CALLERID(num)})
 same => n,Set(CDR(userfield)=ANNOUNCE_722_ALL_CLEAR)
 same => n,System(${UPES_BIN}/log_paging.sh "${CALLERID(num)}" 722 announce-all-clear)
 same => n,Answer()
 same => n,Page(${ALLCAMPUS_SPEAKERS},A(upes-ecs/announce-all-clear)i)
 same => n,Hangup()

exten => 723,1,NoOp(ANNOUNCE assemble by ${CALLERID(num)})
 same => n,Set(CDR(userfield)=ANNOUNCE_723_ASSEMBLE)
 same => n,System(${UPES_BIN}/log_paging.sh "${CALLERID(num)}" 723 announce-assemble)
 same => n,Answer()
 same => n,Page(${ALLCAMPUS_SPEAKERS},A(upes-ecs/announce-assemble)i)
 same => n,Hangup()


; ==================================================================
; MASS-CALLOUT / ROLL-CALL TARGET — ctx_callout  (Emergency Alert Service / EAS)
;   Origination target for scripts/mass_callout.sh. The script drops one Asterisk
;   *call file* per member (non-blocking) that rings the phone as the Emergency
;   Alert Service — CallerID "UPES-EAS" <111>, never ANONYMOUS — and carries the
;   sound, run id and mode as per-call channel variables:
;
;     Channel:  PJSIP/<ext>
;     CallerID: "UPES-EAS" <111>
;     Context:  ctx_callout
;     Extension: notify        (or rollcall)
;     Setvar:   CALLOUT_SOUND=upes-ecs/<sound>
;     Setvar:   CALLOUT_RUNID=<runid>
;     Setvar:   CALLOUT_MODE=<notify|rollcall>
;
;   Call files (not `channel originate`) are used deliberately: they can attach a
;   CallerID, and their Setvar variables exist the instant the callee answers — so
;   Playback(${CALLOUT_SOUND}) below always has its sound. The former globals-based
;   originate raced the answer and often reached Playback with an empty sound,
;   dropping the call with no message.
;
;   In rollcall mode it captures one DTMF digit (1 = safe) and appends
;   ext,response,time to /var/lib/upes-ecs/rollcall/<runid>.csv.
;   This context is NOT included by any role — it is an origination target only.
; ==================================================================
[ctx_callout]
exten => notify,1,Set(CALLOUT_MODE=notify)
 same => n,Goto(run,1)
exten => rollcall,1,Set(CALLOUT_MODE=rollcall)
 same => n,Goto(run,1)

exten => run,1,NoOp(CALLOUT ${CALLOUT_MODE} run=${CALLOUT_RUNID} -> ${CALLERID(num)})
 same => n,Answer()
 same => n,Wait(1)
 same => n,GotoIf($["${CALLOUT_MODE}"="rollcall"]?rollcall:notify)
 same => n(notify),Playback(${CALLOUT_SOUND})                          ; alert only — just play it
 same => n,Hangup()
 ; rollcall: robust digit capture. Background plays the "press 1 if safe" message and is
 ; interrupted the instant a key is pressed (jumping to exten => 1 / _[02-9] below); WaitExten
 ; then keeps one CONTINUOUS listening window. This replaced a two-Read structure whose timeout
 ; gap dropped a press that landed exactly between the two Reads (the digit reached the channel
 ; but neither Read was listening at that instant).
 same => n(rollcall),Background(${CALLOUT_SOUND})
 same => n,WaitExten(12)
 same => n(record),Set(RESP=none)                                     ; no key pressed in the window
 same => n,Goto(log,1)

; ---- rollcall digit handlers (ctx_callout is reached only via the call-file, never dialled) ----
exten => 1,1,Set(RESP=1)
 same => n,Goto(log,1)
exten => _[02-9],1,Set(RESP=${EXTEN})                                 ; any other key = responded, not "safe"
 same => n,Goto(log,1)
exten => i,1,Goto(run,record)
exten => t,1,Goto(run,record)

exten => log,1,Set(RUNID=${FILTER(A-Za-z0-9\-_,${CALLOUT_RUNID})})    ; sanitize path component
 same => n,Set(TS=${STRFTIME(${EPOCH},,%Y-%m-%dT%H:%M:%S%z)})
 ; WHO responded must be the CALLED member, NOT the presented CallerID. The call file forces
 ; CallerID to "UPES-EAS" <111> (so the phone shows the Emergency Alert Service), which means
 ; ${CALLERID(num)} is 111 for EVERY callee — logging that makes the roll-call unable to tell
 ; members apart and get_rollcall() can never match a response to the roster (everyone stays
 ; "unaccounted" even after pressing 1). Log the member ext the call file passes in
 ; CALLOUT_MEMBER; fall back to CALLERID(num) only for manual/legacy calls without it.
 same => n,Set(MEMBER=${FILTER(0-9,${CALLOUT_MEMBER})})
 same => n,ExecIf($["${MEMBER}"=""]?Set(MEMBER=${FILTER(0-9,${CALLERID(num)})}))
 ; NOTE: the ';' between the two shell commands MUST be escaped as '\;'. In extensions.conf a
 ; bare ';' starts a dialplan COMMENT, so "System(mkdir ...; printf ... >> csv)" was silently
 ; truncated to "System(mkdir ...)" at parse time — the printf that writes the CSV never ran,
 ; which is why every roll-call CSV was empty regardless of file permissions. Escaped, both
 ; commands reach /bin/sh. (mkdir is belt-and-suspenders; mass_callout pre-creates the file.)
 same => n,System(mkdir -p /var/lib/upes-ecs/rollcall \; printf '%s,%s,%s\n' '${MEMBER}' '${RESP}' '${TS}' >> /var/lib/upes-ecs/rollcall/${RUNID}.csv)
 same => n,GotoIf($["${RESP}"="1"]?safe:noack)
 same => n(safe),Playback(upes-ecs/rollcall-thanks)                   ; "Thank you, you are marked safe."
 same => n,Hangup()
 same => n(noack),Playback(upes-ecs/rollcall-noack)                   ; "No response recorded."
 same => n,Hangup()


; ==================================================================
; OPTIONAL: FOLLOW-ME / ON-CALL ESCALATION — ctx_escalation_followme
;   A DROP-IN ALTERNATIVE to [ctx_escalation] in extensions_custom.conf. It is
;   NOT wired anywhere by default and does NOT overwrite ctx_escalation. To use
;   it, change the last line of [ctx_emergency_111] from
;       Goto(ctx_escalation,s,1)   to   Goto(ctx_escalation_followme,s,1)
;   After the backup group it also tries an on-call mobile via a SIP trunk, with
;   time-of-day routing (after-hours/weekends -> mobile; daytime -> voicemail).
;   DEPENDENCY: ONCALL_TRUNK + ONCALL_MOBILE globals and a working outbound trunk.
;   (LAN-only Asterisk cannot reach a mobile without such a trunk/gateway.)
; ==================================================================
[ctx_escalation_followme]
exten => s,1,NoOp(Follow-me escalation for ${INCIDENT_ID})
 same => n,Dial(PJSIP/${UPES_LEAD},${UPES_ESC_TIMEOUT})                ; ERT Lead
 same => n,GotoIf($["${DIALSTATUS}"="ANSWER"]?done)
 same => n,Dial(${UPES_BACKUP},${UPES_ESC_TIMEOUT})                    ; backup authority, ring all
 same => n,GotoIf($["${DIALSTATUS}"="ANSWER"]?done)
 ; Time-of-day routing: GotoIfTime(times,weekdays,mdays,months?labeliftrue)
 same => n,GotoIfTime(18:00-23:59,*,*,*?oncall)                        ; evening
 same => n,GotoIfTime(00:00-08:00,*,*,*?oncall)                        ; overnight
 same => n,GotoIfTime(*,sat-sun,*,*?oncall)                            ; weekends
 same => n,Goto(daytime)                                              ; otherwise business hours
 same => n(oncall),NoOp(After-hours: reaching on-call mobile ${ONCALL_MOBILE})
 same => n,Dial(PJSIP/${ONCALL_TRUNK}/${ONCALL_MOBILE},30)
 same => n,GotoIf($["${DIALSTATUS}"="ANSWER"]?done)
 same => n(daytime),Goto(ctx_emergency_vm,s,1)                         ; nobody -> emergency voicemail
 same => n(done),NoOp(Answered - stop escalation)
 same => n,Hangup()

; ----------------------------------------------------------------------------
; SHIFT LOGIN / LOGOUT  (self-service) — *22 on shift, *23 off shift.
; A responder registers their handset, then dials *22 to join the emergency
; queue (start answering 111) and *23 to leave it. Every event is written to
; the shift log for audit + the Console. Mirrors the ert-shift.sh admin tool.
; ----------------------------------------------------------------------------
[ctx_shift]
exten => *22,1,NoOp(SHIFT ON ${CALLERID(num)})
 same => n,AddQueueMember(${UPES_QUEUE},PJSIP/${CALLERID(num)},0,,OnShift-${CALLERID(num)})
 same => n,System(${UPES_BIN}/shift_event.sh "${CALLERID(num)}" ON)
 same => n,Playback(upes-ecs/shift-on)
 same => n,Hangup()
exten => *23,1,NoOp(SHIFT OFF ${CALLERID(num)})
 same => n,RemoveQueueMember(${UPES_QUEUE},PJSIP/${CALLERID(num)})
 same => n,System(${UPES_BIN}/shift_event.sh "${CALLERID(num)}" OFF)
 same => n,Playback(upes-ecs/shift-off)
 same => n,Hangup()

; ==================================================================
; SET MY LANGUAGE — *55            (available to ALL user contexts)
;   Self-service: a caller sets the language their emergency (111/102) calls speak.
;   They enter their language NUMBER (published in the campus directory / the
;   i18n/dtmf-languages.csv map) and it is saved to DB(lang/<ext>), which sub_setlang
;   reads on every future call. This is the SCALABLE alternative to a spoken menu:
;   the interaction is constant-time (enter a number) no matter how many languages
;   exist, and the number->code map is generated from i18n/languages.json (one source
;   of truth), so adding a language never changes this dialplan.
;   NON-emergency and OFF the 111 path (a settings code, like *22/*45). English prompts
;   (the universal language for a deliberate settings action); English is always complete.
;   Map file on the VM: /opt/upes-ecs/dtmf-languages.csv  (number,code,name,native).
;   WIRE IT:  add to [ctx_student] -> include => ctx_setlang   (everyone inherits it)
; ==================================================================
[ctx_setlang]
exten => *55,1,NoOp(SET-LANGUAGE by ${CALLERID(num)})
 same => n,Answer()
 same => n,Set(ATT=0)
 same => n(ask),Set(ATT=$[${ATT}+1])
 same => n,Read(LNUM,upes-ecs/lang-ask,3,,1,7)             ; "enter your language number, then hash"
 same => n,Set(LNUM=${FILTER(0-9,${LNUM})})                ; digits only
 same => n,GotoIf($["${LNUM}"=""]?retry)
 ; Look up the language code for that number in the shipped map (single source of truth).
 ; The ';' inside the awk body MUST stay out: a bare ';' in extensions.conf starts a COMMENT
 ; (the roll-call/callback CSV trap), so we use 'print | head -1' rather than '{...; exit}'.
 ; ($1+0)==(n+0) is a numeric compare so "07" and "7" both match row 7.
 same => n,Set(NEWLANG=${SHELL(awk -F, -v n="${LNUM}" 'NR>1 && ($1+0)==(n+0){print $2}' /opt/upes-ecs/dtmf-languages.csv | head -1)})
 same => n,Set(NEWLANG=${FILTER(a-z,${NEWLANG})})          ; sanitize the looked-up code
 same => n,GotoIf($["${NEWLANG}"=""]?bad)
 same => n,Set(DB(lang/${CALLERID(num)})=${NEWLANG})       ; persist this caller's language
 same => n,Set(CHANNEL(language)=${NEWLANG})               ; if a localized confirm exists, use it
 same => n,Playback(upes-ecs/lang-set)                     ; "Your emergency language is now set."
 same => n,Hangup()
 same => n(bad),Playback(upes-ecs/lang-badcode)            ; "That is not a valid language number."
 same => n(retry),GotoIf($[${ATT} < 3]?ask)
 same => n,Hangup()

; ============================================================================
; END extensions_features.conf.  Test order: 199 drill -> each feature in a
; drill window -> 111.  See FEATURES.md for per-feature dependencies & tests.
; ============================================================================
