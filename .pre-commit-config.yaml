# Run locally:  pre-commit install && pre-commit run --all-files
# CI runs the same hooks (.github/workflows/lint.yml).
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
      - id: check-merge-conflict
      # line endings are governed authoritatively by .gitattributes
      # (LF default, CRLF for .ps1/.cmd/.bat); no mixed-line-ending hook here.
      - id: check-yaml
        args: [--unsafe]      # mkdocs.yml uses custom !!python/name: tags
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=1024]  # large binaries belong in Git LFS

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck
        args: [--severity=error]   # block real bugs, not style nits

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
