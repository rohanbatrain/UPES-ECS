site_name: UPES-ECS
site_description: >-
  UPES-ECS — a LAN-first campus emergency communication system:
  one-number hotline, ERT dispatch, multilingual IVR, and live wallboards.
site_author: Rohan Batra
# Docs are served under /docs/ ; the landing page is the Pages site root.
site_url: https://rohanbatrain.github.io/UPES-ECS/docs/
repo_url: https://github.com/rohanbatrain/UPES-ECS
repo_name: rohanbatrain/UPES-ECS
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 Rohan Batra

theme:
  name: material
  language: en
  icon:
    logo: material/phone-alert
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - tags
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rohanbatrain/UPES-ECS

